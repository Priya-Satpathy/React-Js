<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Document</title>
</head>
<body>

    <div>
        <h1>Input mark of three subjects</h1>
        <div>
            <div>
                <label for="text">Subject 1:</label>
                <input type="textbox" id="sub1">
            </div>
            <div>
                <label for="text">Subject 2:</label>
                <input type="textbox" id="sub2">
            </div>
            <div>
                <label for="text">Subject 3:</label>
                <input type="textbox" id="sub3">
            </div>  
            
        </div>
        <h3>Total mark is : </h3>
        <p id="result">0</p>
    </div>

    <script>
        let subOneInput = document.getElementById("sub1");
        let subTwoInput = document.getElementById("sub2"); 
        let subThreeInput = document.getElementById("sub3");
        let result = document.getElementById("result");

        subOneInput.addEventListener("input",function(){
            let s1 = parseInt(subOneInput.value) || 0;
            let s2 = parseInt(subTwoInput.value) || 0;
            let s3 = parseInt(subThreeInput.value) || 0;

            let total = s1 + s2 + s3;

            result.innerHTML = total;
        });

        subTwoInput.addEventListener("input",function(){
            let s1 = parseInt(subOneInput.value) || 0;
            let s2 = parseInt(subTwoInput.value) || 0;
            let s3 = parseInt(subThreeInput.value) || 0;

            let total = s1 + s2 + s3;

            result.innerHTML = total;
        });

        subThreeInput.addEventListener("input",function(){
            let s1 = parseInt(subOneInput.value) || 0;
            let s2 = parseInt(subTwoInput.value) || 0;
            let s3 = parseInt(subThreeInput.value) || 0;

            let total = s1 + s2 + s3;

            result.innerHTML = total;
        });

    </script>
    
</body>
</html>
